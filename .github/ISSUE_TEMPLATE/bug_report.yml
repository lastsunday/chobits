name: Bug report
description: Create a report to help us improve
title: "[Bug]: "
labels: [bug]
assignees:
  - lastsunday
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Select the module this bug belongs to.
      options:
        - Extension（浏览器扩展）
        - Server（后端 Rust + 管理后台 UI）
        - Docs / Other（文档 / 其他）
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 14, Windows 11"
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g. Chrome 125, Firefox 128"
  - type: input
    id: extension_version
    attributes:
      label: Extension version
      placeholder: "e.g. 4.2.0"
  - type: input
    id: server_version
    attributes:
      label: Server version (if applicable)
      placeholder: "e.g. 1.0.0"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
