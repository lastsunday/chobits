version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    reviewers:
      - "lastsunday"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    reviewers:
      - "lastsunday"
    versioning-strategy: increase
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        dependency-type: "production"
        update-types:
          - "major"
    ignore:
      - dependency-name: "@types/*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

  - package-ecosystem: cargo
    directory: /apps/server
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    reviewers:
      - "lastsunday"

  - package-ecosystem: docker
    directory: /apps/server
    schedule:
      interval: weekly
    labels:
      - dependencies
    reviewers:
      - "lastsunday"
