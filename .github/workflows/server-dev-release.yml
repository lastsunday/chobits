name: server-dev-release
run-name: ${{ github.actor }} server dev build

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [dev]

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      dev-version: ${{ steps.gen.outputs.DEV_VERSION }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - uses: dorny/paths-filter@de90bc6a95a69c3fdf0c0f30488bf5fbe7054183
        id: filter
        with:
          filters: |
            server:
              - 'apps/server/**'
            server-ui:
              - 'apps/server-ui/**'
            workspace:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

      - id: gen
        if: |
          github.event_name == 'workflow_dispatch' ||
          steps.filter.outputs.server == 'true' ||
          steps.filter.outputs.server-ui == 'true' ||
          steps.filter.outputs.workspace == 'true'
        run: |
          dev_version=$(bash scripts/dev-version.sh apps/server/Cargo.toml)
          echo "DEV_VERSION=$dev_version" >> "$GITHUB_ENV"
          echo "DEV_VERSION=$dev_version" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.dev-version != ''
    uses: ./.github/workflows/reusable-server-build.yml
    with:
      version: ${{ needs.prepare.outputs.dev-version }}
      prerelease: true
      tag-name: dev-server-${{ github.run_number }}
    secrets: inherit

  cleanup:
    needs: build
    uses: ./.github/workflows/reusable-dev-release-cleanup.yml
    with:
      tag-prefix: dev-server-
    secrets: inherit
