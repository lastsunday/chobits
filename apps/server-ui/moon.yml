language: 'typescript'
layer: 'application'
tags: ['react', 'admin']

tasks:
  build:
    command: 'pnpm'
    args: ['run', 'build']
    deps:
      - ~:ensure-deps
  test:
    command: 'pnpm'
    args: ['run', 'test']
    deps:
      - ~:ensure-deps
  typecheck:
    command: 'pnpm'
    args: ['run', 'typecheck']
    deps:
      - ~:ensure-deps
  dev:
    command: 'pnpm'
    args: ['run', 'dev']
    options:
      persistent: true
      runInCI: false
  preview:
    command: 'pnpm'
    args: ['run', 'preview']
    options:
      persistent: true
      runInCI: true
