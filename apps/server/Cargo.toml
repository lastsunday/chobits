[package]
name = "chobits-server"
version = "0.1.0"
edition = "2021"
publish = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 8
strip = true
debug = false

[dependencies]
api = { path = "api" }
# llm start
candle-core = { version = "0.9.1" }
tokenizers = { version = "0.22.1", default-features = false, features = [
  "fancy-regex",
] }
candle-transformers = { version = "0.9.1" }
candle-nn = { version = "0.9.1" }
fancy-regex = { version = "0.16.2" }
intel-mkl-src = { version = "0.8.1", features = [
  "mkl-static-lp64-iomp",
], optional = true }
accelerate-src = { version = "0.3.2", optional = true }
# llm end

[build-dependencies]
# llm start
bindgen_cuda = { version = "0.1.5", optional = true }
# llm end

[features]
default = []
vendored-openssl = []
cuda = [
  "candle-core/cuda",
  "candle-nn/cuda",
  "candle-transformers/cuda",
  "dep:bindgen_cuda",
]
# llm end
