[package]
name = "api"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8.4", features = ["macros", "ws"] }
axum-extra = { version = "0.10.1" }
tokio = { version = "1.45.1", features = ["full"] }
tracing = { version = "0.1.41", features = ["async-await"] }
tracing-subscriber = { version = "0.3.19", features = ["env-filter", "chrono"] }
config = { version = "0.15.11", features = ["yaml"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_yaml = { version = "0.9.33" }
anyhow = { version = "1.0.98" }
sea-orm = { version = "1.1.12", features = [
  "with-chrono",
  "debug-print",
  "sqlx-postgres",
  "sqlx-sqlite",
  "with-rust_decimal",
  "runtime-tokio-rustls",
  "macros",
] }
thiserror = { version = "2.0.12" }
tower-http = { version = "0.6.6", features = [
  "trace",
  "timeout",
  "limit",
  "cors",
  "normalize-path",
  "auth",
  "compression-full",
] }
tower-layer = { version = "0.3.3" }
xid = { version = "1.1.1" }
bytesize = { version = "2.0.1" }
validator = { version = "0.20.0", features = ["derive"] }
axum-valid = { version = "0.24.0", features = ["full_validator"] }
regex = { version = "1.11.1" }
idgenerator = { version = "2.0.0" }
bcrypt = { version = "0.17.0" }
jsonwebtoken = { version = "9.3.1" }
utoipa = { version = "5.4.0", features = ["axum_extras", "debug", "chrono"] }
utoipa-axum = { version = "0.2.0", features = ["debug"] }
utoipa-scalar = { version = "0.3.0", features = ["axum"] }
serde_json = "1.0.140"
serde-aux = { version = "4.7.0" }
http-body-util = "0.1.3"
mime = "0.3"
chrono = "0.4.41"
testcontainers = "0.24.0"
testcontainers-modules = { version = "0.12.1", features = [
  "postgres",
  "gitea",
] }
rust-i18n = { version = "3.1.5" }
futures-util = { version = "0.3.31", default-features = false, features = [
  "sink",
  "std",
] }
futures-channel = { version = "0.3.31" }
jiff = { version = "0.2.15" }
opus = { version = "0.3.0" }
sherpa-rs = { version = "0.7.0", features = [
  "static",
  "tts",
], default-features = false, package = "chobits-sherpa-rs" }
tokio-stream = { version = "0.1.17" }
futures = { version = "0.3.31" }
openssl = { version = "0.10.73", features = ["vendored"] }
# llm start
candle-core = { version = "0.9.1" }
tokenizers = { version = "0.21.4", default-features = false, features = [
  "fancy-regex",
] }
candle-transformers = { version = "0.9.1" }
candle-nn = { version = "0.9.1" }
fancy-regex = { version = "0.16.1" }
intel-mkl-src = { version = "0.8.1", features = [
  "mkl-static-lp64-iomp",
], optional = true }
accelerate-src = { version = "0.3.2", optional = true }
candle-onnx = { version = "0.9.1" }
# llm end
# asr start
byteorder = { version = "1.4.3" }
rand = { version = "0.9.2" }
rand_distr = { version = "0.5.1" }
# asr end

entity = { path = "../entity" }
migration = { path = "../migration" }
service = { path = "../service" }
framework = { path = "../framework" }
web = { path = "../web" }

[dev-dependencies]
tower = { version = "0.5.2", features = ["util"] }
cucumber = { version = "0.21.1", features = ["tracing", "output-json"] }
futures = "0.3"

[build-dependencies]
# llm start
bindgen_cuda = { version = "0.1.1", optional = true }
# llm end

[features]
default = []
vendored-openssl = []
# llm start
accelerate = [
  "dep:accelerate-src",
  "candle-core/accelerate",
  "candle-nn/accelerate",
  "candle-transformers/accelerate",
]
mkl = [
  "dep:intel-mkl-src",
  "candle-core/mkl",
  "candle-nn/mkl",
  "candle-transformers/mkl",
]
cuda = [
  "candle-core/cuda",
  "candle-nn/cuda",
  "candle-transformers/cuda",
  "dep:bindgen_cuda",
]
# llm end
