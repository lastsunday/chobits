language: "rust"
tags: ["backend"]

tasks:
  bump:
    script: |
      bash ../../scripts/bump.sh \
        "chobits-server" \
        "Cargo.toml" \
        "apps/server/**" \
        "apps/server-ui/**"
    options:
      runInCI: false

  format:
    command: "cargo fmt --check"

  check:
    command: "cargo check --package chobits-server"

  build:
    command: "cargo build --package chobits-server"
    outputs: ["/target/debug/chobits-server"]
    deps:
      - ~:check

  lint:
    command: "cargo clippy --workspace -- -D warnings"
    deps:
      - ~:check

  test:
    command: "cargo test --package chobits-server"

  test-pg:
    command: "cargo test --package chobits-server"
    env:
      TEST_DATABASE: "pg"
    deps:
      - ~:build

  run:
    command: "cargo run --package chobits-server -- --config=application.toml"
    options:
      persistent: true
      cache: false

  dev:
    command: "cargo run --package chobits-server -- --config=application-dev.toml"
    options:
      persistent: true
      cache: false

  dev-minimal:
    command: 'cargo run --package chobits-server -- -O "vad_model=''void''" -O "asr_model=''void''" -O "tts_model=''mute''" -O "llm_model=''echo''"'
    options:
      persistent: true
      cache: false

  downloader:
    command: "cargo run --package chobits-server -- downloader --help"
    deps:
      - ~:build
    options:
      cache: false

  downloader-install:
    command: "cargo run --package chobits-server -- downloader install"
    deps:
      - ~:build
    options:
      cache: false

  downloader-list:
    command: "cargo run --package chobits-server -- downloader list"
    deps:
      - ~:build
    options:
      cache: false
