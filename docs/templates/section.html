{% extends "base.html" %}

{% block content %}
<article class="page">
  {{ section.content | safe }}
  {% if section.pages %}
  <ul class="page-list">
    {% for page in section.pages %}
    <li><a href="{{ page.permalink }}">{{ page.title }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}
</article>
{% endblock content %}
