[git]
conventional_commits = true

commit_parsers = [
  { message = "^\\w+(\\(\\w+\\))?\\!:", group = "💣 BREAKING CHANGES" },
  { body = "BREAKING CHANGE", group = "💣 BREAKING CHANGES" },
  { message = "^feat", group = "⭐ Added" },
  { message = "^fix", group = "🐛 Fixed" },
  { message = "^perf", group = "🚀 Performance" },
  { message = "^remove", group = "🗑️ Removed" },
  { message = "^deprecate", group = "❕ Deprecated" },
  { message = "^security", group = "🛡️ Security" },
  { message = ".*", skip = true },
]

commit_preprocessors = [
  { pattern = "(?m)^CHANGELOG: .*", replace_command = "bash -c \"if git diff-tree --no-commit-id -r --name-only $COMMIT_SHA | grep -qvE '${GIT_CLIFF_INCLUDE_PATTERNS:-.*}' 2>/dev/null; then exit 0; else cat; fi\"" },
  { pattern = "^[\\s\\S]*\\bBREAKING\\s+CHANGE\\b[\\s\\S]*$", replace_command = "sed -E 's/^(\\w+(\\(\\w+\\))?)(!)?:/\\1!:/'" },
]

[changelog]
trim = false
body = """
## {{ version }} ({{ timestamp | date(format="%Y-%m-%d") }})
{%- for group, commits in commits | group_by(attribute="group") %}

### {{ group }}
{% for commit in commits -%}
{%- if group == "💣 BREAKING CHANGES" %}
{%- for footer in commit.footers -%}{% if footer.token == "BREAKING CHANGE" %}
- {{ footer.value | upper_first }}{% endif %}{% endfor -%}
{%- elif "CHANGELOG: " in commit.raw_message %}
{%- for footer in commit.footers -%}{% if footer.token == "CHANGELOG" %}
- {{ footer.value | upper_first }}{% endif %}{% endfor -%}
{%- endif -%}
{%- endfor -%}
{%- endfor %}

"""
